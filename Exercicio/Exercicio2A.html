<!--
Crie um objeto chamado jogo que inicia com a propriedade pontos valendo 0. 
Crie um método chamado marcarPonto que adiciona 10 pontos à propriedade sempre 
que for chamado. Complete a função JavaScript do botão para atualizar a tela.
-->

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>2B - Exercício: Pontos do Jogo</title>
</head>
<body>
    <h2>Exercício 2B: Pontuação do Score</h2>
    <p>Pontos do Jogador: <strong id="txtPontos">0</strong></p>
    <button onclick="ganharPontos()">Eliminar Monstro (+10 pts)</button>

    <script>
        const jogo ={
            ponto: 0,
            marcarPonto: function(){
                this.ponto += 10
            }};
            function ganharPontos(){
                jogo.marcarPonto();
                document.getElementById("txtPontos").innerHTML = jogo.ponto;
            }
        
    </script>
</body>
</html>
