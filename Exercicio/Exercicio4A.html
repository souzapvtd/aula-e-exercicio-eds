<!--
Crie um objeto chamado perfil com a propriedade booleana seguindo iniciando em
false. Crie um método chamado trocarSeguir que inverte esse valor. Complete a
função do script para que o texto do botão mude dinamicamente para "Seguindo ✓"
ou "Seguir".
-->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>4B - Exercício: Seguir</title>
</head>
<body>
<h2>Exercício 4B: Rede Social</h2>
<button onclick="cliqueSeguir()" id="btnSeguir">Seguir</button>

<script>
// TODO: Crie o objeto 'perfil' e o método 'trocarSeguir'
    const perfil = {
        seguindo : false,
        trocarSeguir: function(){
            this.seguindo = !this.seguindo;
        },      
    }
    function cliqueSeguir(){
        perfil.trocarSeguir();
        document.getElementById("btnSeguir").innerHTML = pefil.seguindo ? "Seguindo" : "Seguir"
    };
    
    // TODO: Altere o estado do objeto e mude o texto do botão usando if ou operador ternário

</script>
</body>
</html>
