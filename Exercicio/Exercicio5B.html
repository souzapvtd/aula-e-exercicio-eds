<!--
Crie um objeto chamado carro com a propriedade combustivel iniciando em 20. 
Crie um método chamado adicionarGasolina(litros) que recebe a quantidade digitada 
e soma no tanque atual. Capture o valor digitado pelo usuário e passe para o método 
do seu objeto.
-->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>5B - Exercício: Combustível</title>
</head>
<body>
    <h2>Exercício 5B: Tanque de Combustível</h2>
    <p>Gasolina no Tanque: <span id="txtGasolina">20</span> Litros</p>

    <input type="number" id="valGasolina" placeholder="Quantos litros?">
    <button onclick="executarAbastecimento()">Abastecer</button>

    <script>
       const carro = {
            combustivel: 20,
            adicionarGasolina: function(quantidade){
                this.combustivel += quantidade;
            },
            removeGasolina: function(valor){
                this.combustivel -= valor;
            }
        };

        function executarAbastecimento(){
            let valorDigitado = Number(document.getElementById('valGasolina').value);

            if (valorDigitado <=0){
                alert("Digite um número válido!");
                return;
            }
            carro.adicionarGasolina(valorDigitado);
            document.getElementById('txtGasolina').innerHTML = carro.combustivel;
        }

        function removerGasolina(){
            let valorTirar = Number(document.getElementById('tiraGasolina').value);

            if (valorTirar > carro.combustivel){
                alert(`Não é possível retirar tudo isso de combustível.Combustível atual: ${carro.combustivel}`);
                return;
            }
            carro.removeGasolina(valorTirar);
            document.getElementById('txtGasolina').innerHTML = carro.combustivel;
        }

    </script>
</body>
</html>
