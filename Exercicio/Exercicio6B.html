<!--
Crie um objeto chamado voo com a propriedade assentosLivres iniciando com 5. 
Adicione um método comprarPassagem(quantidade). Caso haja assentos disponíveis suficientes 
para a compra, o sistema deve deduzir os assentos e retornar uma mensagem de sucesso, caso 
contrário deve impedir a venda retornando um aviso de erro.
-->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>6B - Exercício: Voo</title>
</head>
<body>
    <h2>Exercício 6B: Sistema de Passagens Aéreas</h2>
    <p>Assentos Disponíveis: <span id="txtAssentos">5</span></p>

    <input type="number" id="valPassagens" placeholder="Quantas passagens?">
    <button onclick="executarCompra()">Comprar</button>
    <p id="msgVoo" style="color: blue;"></p>

    <script>
       const voo = {
            assentosLivre: 5,
            comprarPassagem: function(quantidade){
                if(quantidade <= this.assentosLivre){
                    this.assentosLivre -= quantidade;
                    return "Assentos comprado com sucesso"
                }else{return"Erro: Não há assentos suficientes para seu pedido"}
            }};
            function executarCompra(){
                let qtd = Number(document.getElementById("valPassagens").value);
                let aviso = voo.comprarPassagem(qtd);

                document.getElementById("txtAssentos").innerText = voo.assentosLivre;
                document.getElementById("msgVoo").innerText = aviso;

            }
    </script>
</body>
</html>
