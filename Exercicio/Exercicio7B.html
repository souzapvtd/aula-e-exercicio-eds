<!--
Crie um objeto funcionario com propriedades vazias nome e setor. Crie um método chamado 
gerarCracha que retorne "CRACHÁ: [nome] - DEPT: [setor]". Ao clicar no botão, capture os 
inputs do usuário, jogue para dentro do objeto e exiba o resultado na tela.
-->

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>7B - Exercício: Crachá</title>
</head>
<body>
    <h2>Exercício 7B: Sistema de RH (Crachás)</h2>
    <input type="text" id="nomeFunc" placeholder="Nome do Funcionário"><br><br>
    <input type="text" id="setorFunc" placeholder="Setor/Departamento"><br><br>
    <button onclick="criarCracha()">Imprimir Crachá</button>
    
    <p id="txtCracha" style="font-weight: bold; color: darkblue;"></p>

    <script>
        const funcionario = {
            nome: "",
            setor:"",
            dadosCracha: function(){
                return `CRACHÁ ${this.nome} <br> DEPT: ${this.setor}`;
            }
        };

        function criarCracha(){
            funcionario.nome = document.getElementById('nomeFunc').value.toUpperCase();
        funcionario.setor = document.getElementById('setorFunc').value.toUpperCase();
        document.getElementById("txtCracha").innerHTML = funcionario.dadosCracha();
        }
    </script>
</body>
</html>
