<!--
Crie um objeto chamado som com as propriedades volumeAtual valendo 0 
e volumeMaximo valendo 10. Crie um método chamado aumentarVolume que 
soma 2 unidades por vez. Adicione uma verificação para não deixar o 
volume passar de 10. Se tentar passar, exiba uma mensagem na tela 
avisando que está no máximo.
-->

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>8B - Exercício: Volume</title>
</head>
<body>
    <h2>Exercício 8B: Controle de Volume Caixa Amplificada</h2>
    <p>Volume: <span id="txtVol">0</span></p>
    <button onclick="maisSom()">Aumentar Volume (+2)</button>
    <p id="msgVol" style="color: red;"></p>

    <script>
        const som = {
            volumeAtual:0,
            aumentarVolume: function(){
                this.volumeAtual += 2
            }
        };
        function maisSom(){
            if(som.volumeAtual >= 10){
                document.getElementById("msgVol").innerHTML = "Ja está na volume limite!"
            }else{
            som.aumentarVolume();
            document.getElementById("txtVol").innerHTML = som.volumeAtual;
            };
        };
    </script>
</body>
</html>
